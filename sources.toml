# Question Sources Configuration
# This file defines all dataset paths and question sources for the jbot trivia game.
# After editing, restart the bot for changes to take effect.

# ===================
# Dataset Paths
# ===================
# Centralized paths for all question datasets
# Keys here are referenced by sources below (e.g., dataset = "jeopardy")

[datasets]
jeopardy = "datasets/combined_season1-41.tsv"
knowledge_bowl = "datasets/knowledge_bowl.csv"
riddles_small = "datasets/riddles_small.csv"
riddles_with_hints = "datasets/riddles_with_hints.csv"
"5th_grader" = "datasets/5th_grader.csv"
general_trivia = "datasets/general_trivia.csv"
millionaire_easy = "datasets/millionaire_easy.csv"
millionaire_hard = "datasets/millionaire_hard.csv"

# ===================
# Question Sources
# ===================
# Each [[source]] defines where questions come from and their selection weight.
# Higher weight = more likely to be selected.
# Total weights are relative (e.g., 100:20 means 5:1 ratio).
# At least one source must be defined for the bot to start.

# --- File-Based Sources ---
# 5th Grader questions
[[source]]
name = "5th_grader"
type = "file"
dataset = "5th_grader"
weight = 100.0
# reader: Which reader function to use for this dataset
reader = "simple"
# category: Category name to assign to questions (for simple reader)
category = "Are You Smarter Than a Fifth Grader"

# Jeopardy questions (easy difficulty only)
[[source]]
name = "jeopardy_easy"
type = "file"
dataset = "jeopardy"
weight = 100.0
reader = "jeopardy"
# clue_values: Only include questions with these point values
clue_values = [100, 200]
# final_jeopardy_score_sub: Score substitution for Final Jeopardy questions
final_jeopardy_score_sub = 10000
points = 100

