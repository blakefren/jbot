services:
  jbot:
    image: jbot
    build: .
    container_name: jbot-container
    env_file:
      - .env
    environment:
      - TZ=America/Los_Angeles
      - DEBIAN_FRONTEND=noninteractive
    volumes:
      - ./db/jbot.db:/app/db/jbot.db
      - ./db/backups:/app/db/backups
    restart: unless-stopped
