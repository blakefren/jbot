name: Game Simulation

on:
  push:
    branches: [ "main" ]
    paths:
      - 'src/core/daily_game_simulator.py'
      - 'src/core/events.py'
      - 'src/core/guess_handler.py'
      - 'src/core/player.py'
      - 'src/core/scoring.py'
      - 'src/core/state.py'
      - 'scripts/simulate_powerups.py'
      - '.env.template'
      - '.github/workflows/simulation.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'src/core/daily_game_simulator.py'
      - 'src/core/events.py'
      - 'src/core/guess_handler.py'
      - 'src/core/player.py'
      - 'src/core/scoring.py'
      - 'src/core/state.py'
      - 'scripts/simulate_powerups.py'
      - '.env.template'
      - '.github/workflows/simulation.yml'

jobs:
  simulate:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.14'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Run Powerup Simulation
      run: |
        echo "## Powerup Simulation Results" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        python scripts/simulate_powerups.py >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
